name: deploy-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_APP_BASE_PATH: ${{ vars.VITE_APP_BASE_PATH || '/' }}
      VITE_APP_ORIGIN: ${{ vars.VITE_APP_ORIGIN || 'https://training.jeffreyboersma.com' }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_EDGE_FUNCTION_URL: ${{ vars.VITE_SUPABASE_EDGE_FUNCTION_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate public build configuration
        run: |
          test -n "$VITE_SUPABASE_URL" || (echo "Missing required GitHub variable: VITE_SUPABASE_URL" && exit 1)
          test -n "$VITE_SUPABASE_ANON_KEY" || (echo "Missing required GitHub variable: VITE_SUPABASE_ANON_KEY" && exit 1)
      - run: npm run build
      - run: npm run verify:pages-fallback
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
