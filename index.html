<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training App</title>
    <script>
      (function () {
        var location = window.location;

        if (location.search.length <= 1 || location.search.charAt(1) !== '/') {
          return;
        }

        var decoded = location.search
          .slice(1)
          .split('&')
          .map(function (segment, index) {
            return index === 0 ? segment : segment.replace(/~and~/g, '&');
          })
          .join('?');
        var basePath = location.pathname.endsWith('/') ? location.pathname.slice(0, -1) : location.pathname;

        window.history.replaceState(null, '', basePath + decoded + location.hash);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
